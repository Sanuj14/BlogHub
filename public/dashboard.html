<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — BlogHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body data-page="dashboard">
  <div id="site-nav"></div>

  <main class="page">
    <div class="container">
      <div class="toolbar" style="justify-content:space-between;align-items:flex-end">
        <div class="page-head" style="margin:0">
          <span class="eyebrow">Dashboard</span>
          <h1 id="greeting">Your stories</h1>
          <p class="muted">Manage everything you've written.</p>
        </div>
        <a href="/create-blog.html" class="btn btn-primary"><i class="fa-solid fa-pen-nib"></i> New story</a>
      </div>

      <!-- Profile card -->
      <div class="glass" id="profileCard" style="padding:24px;margin-bottom:28px;display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap">
        <div style="position:relative;flex:none">
          <div id="avatarPreview" style="width:80px;height:80px;border-radius:50%;overflow:hidden;background:var(--gradient-3);display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:1.6rem;font-weight:700;cursor:pointer" title="Click to change photo"></div>
          <label for="avatarFile" style="position:absolute;bottom:0;right:0;background:var(--brand-1);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.7rem" title="Upload photo">
            <i class="fa-solid fa-camera" style="color:#fff"></i>
          </label>
          <input type="file" id="avatarFile" accept="image/*" style="display:none" />
        </div>
        <div style="flex:1;min-width:200px">
          <div id="profileView">
            <div style="font-family:var(--font-head);font-size:1.1rem;font-weight:700" id="profileName"></div>
            <div class="muted" style="font-size:.85rem" id="profileUsername"></div>
            <button class="btn btn-ghost btn-sm" id="editProfileBtn" style="margin-top:10px"><i class="fa-solid fa-pen"></i> Edit profile</button>
          </div>
          <div id="profileEdit" style="display:none">
            <div style="margin-bottom:12px">
              <label style="font-size:.8rem;display:block;margin-bottom:6px">Profile photo</label>
              <label for="avatarFile" class="btn btn-ghost btn-sm" style="cursor:pointer">
                <i class="fa-solid fa-camera"></i> Change photo
              </label>
            </div>
            <div class="grid grid-2" style="gap:12px;margin-bottom:12px">
              <div class="field" style="margin:0">
                <label style="font-size:.8rem">Name</label>
                <input class="input" id="editName" placeholder="Your name" />
              </div>
              <div class="field" style="margin:0">
                <label style="font-size:.8rem">Username</label>
                <input class="input" id="editUsername" placeholder="username" />
              </div>
            </div>
            <div style="display:flex;gap:8px">
              <button class="btn btn-primary btn-sm" id="saveProfileBtn"><i class="fa-solid fa-check"></i> Save</button>
              <button class="btn btn-ghost btn-sm" id="cancelProfileBtn">Cancel</button>
            </div>
          </div>
        </div>
      </div>

      <div class="grid grid-4" id="stats" style="margin-bottom:34px"></div>

      <div id="myBlogs"></div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="/js/config.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
