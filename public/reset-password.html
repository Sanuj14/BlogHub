<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password — BlogHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body data-page="login">
  <div id="site-nav"></div>

  <main class="auth-wrap">
    <div class="auth-card glass reveal in">
      <div id="alert"></div>

      <!-- Step 1: enter email -->
      <div id="step1">
        <h1>Forgot password?</h1>
        <p class="sub">Enter your email and we'll send you a 6-digit code.</p>
        <form id="forgotForm">
          <div class="field">
            <label for="email">Email</label>
            <input class="input" id="email" name="email" type="email" placeholder="you@example.com" required />
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="sendBtn">
            <i class="fa-solid fa-paper-plane"></i> Send code
          </button>
        </form>
        <p class="auth-switch"><a href="/login.html">← Back to login</a></p>
      </div>

      <!-- Step 2: enter code + new password -->
      <div id="step2" style="display:none">
        <h1>Enter your code</h1>
        <p class="sub">Check your email for the 6-digit code. It expires in 15 minutes.</p>
        <form id="resetForm">
          <div class="field">
            <label for="code">6-digit code</label>
            <input class="input" id="code" name="code" placeholder="123456" maxlength="6" required />
          </div>
          <div class="field">
            <label for="password">New password</label>
            <input class="input" id="password" name="password" type="password" placeholder="At least 6 characters" required />
          </div>
          <div class="field">
            <label for="confirmPassword">Confirm password</label>
            <input class="input" id="confirmPassword" name="confirmPassword" type="password" placeholder="Repeat your password" required />
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="resetBtn">
            <i class="fa-solid fa-lock"></i> Reset password
          </button>
        </form>
        <p class="auth-switch"><a href="#" id="resendLink">Resend code</a></p>
      </div>
    </div>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/reset-password.js"></script>
</body>
</html>
