<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create account — BlogHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body data-page="register">
  <div id="site-nav"></div>

  <main class="auth-wrap">
    <div class="auth-card glass reveal in">
      <h1>Create your account</h1>
      <p class="sub">Join BlogHub and start sharing your stories.</p>

      <div id="alert"></div>

      <form id="registerForm">
        <div class="field">
          <label for="name">Full name</label>
          <input class="input" id="name" name="name" placeholder="Ada Lovelace" required />
        </div>
        <div class="field">
          <label for="username">Username</label>
          <input class="input" id="username" name="username" placeholder="ada_l" required />
          <p class="hint">Letters, numbers and underscores. Min 3 characters.</p>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input class="input" id="email" name="email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input class="input" id="password" name="password" type="password" placeholder="At least 6 characters" required />
        </div>
        <div class="field">
          <label for="confirmPassword">Confirm password</label>
          <input class="input" id="confirmPassword" name="confirmPassword" type="password" placeholder="Repeat your password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
          <i class="fa-solid fa-user-plus"></i> Create account
        </button>
      </form>

      <p class="auth-switch">Already have an account? <a href="/login.html">Log in</a></p>
    </div>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/auth-pages.js"></script>
</body>
</html>
