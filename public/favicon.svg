<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect x="6" y="6" width="88" height="88" rx="12" fill="#0c0c0c"/>
  <g transform="translate(50 50)">
    <!-- red glitch offset -->
    <g transform="translate(3 3)" fill="#ff3b23">
      <rect x="-6.5" y="-30" width="13" height="60" rx="6.5"/>
      <rect x="-6.5" y="-30" width="13" height="60" rx="6.5" transform="rotate(60)"/>
      <rect x="-6.5" y="-30" width="13" height="60" rx="6.5" transform="rotate(120)"/>
    </g>
    <!-- yellow glitch offset -->
    <g transform="translate(-3 -3)" fill="#ffe500">
      <rect x="-6.5" y="-30" width="13" height="60" rx="6.5"/>
      <rect x="-6.5" y="-30" width="13" height="60" rx="6.5" transform="rotate(60)"/>
      <rect x="-6.5" y="-30" width="13" height="60" rx="6.5" transform="rotate(120)"/>
    </g>
    <!-- main mark -->
    <g fill="#f3f1ea">
      <rect x="-6.5" y="-30" width="13" height="60" rx="6.5"/>
      <rect x="-6.5" y="-30" width="13" height="60" rx="6.5" transform="rotate(60)"/>
      <rect x="-6.5" y="-30" width="13" height="60" rx="6.5" transform="rotate(120)"/>
    </g>
  </g>
</svg>
