<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore — BlogHub</title>
  <meta name="description" content="Discover stories from the BlogHub community." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body data-page="blogs">
  <div id="site-nav"></div>

  <main class="page">
    <div class="container">
      <div class="page-head reveal">
        <span class="eyebrow">Explore</span>
        <h1 id="page-title">All stories</h1>
        <p class="muted" id="page-sub">Discover what the community is writing about.</p>
      </div>

      <div class="toolbar">
        <div class="search">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input class="input" type="search" id="searchInput" placeholder="Search stories, topics, tags..." />
        </div>
        <select class="input" id="categorySelect" style="max-width:220px">
          <option value="">All categories</option>
          <option>Technology</option><option>Lifestyle</option><option>Travel</option>
          <option>Food</option><option>Health</option><option>Business</option>
          <option>Literature</option><option>Culture</option><option>Other</option>
        </select>
      </div>

      <div id="results"></div>
      <div id="pagination" class="pagination"></div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="/js/config.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/blogs.js"></script>
</body>
</html>
