<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 140" width="460" height="140" font-family="'Arial Black', 'Archivo Black', Arial, sans-serif">
  <!-- badge with brutalist offset shadow -->
  <rect x="18" y="26" width="100" height="100" rx="16" fill="#ff3b23"/>
  <rect x="10" y="18" width="100" height="100" rx="16" fill="#0c0c0c"/>
  <g transform="translate(60 68)">
    <g transform="translate(3 3)" fill="#ff3b23">
      <rect x="-7" y="-31" width="14" height="62" rx="7"/>
      <rect x="-7" y="-31" width="14" height="62" rx="7" transform="rotate(60)"/>
      <rect x="-7" y="-31" width="14" height="62" rx="7" transform="rotate(120)"/>
    </g>
    <g transform="translate(-3 -3)" fill="#ffe500">
      <rect x="-7" y="-31" width="14" height="62" rx="7"/>
      <rect x="-7" y="-31" width="14" height="62" rx="7" transform="rotate(60)"/>
      <rect x="-7" y="-31" width="14" height="62" rx="7" transform="rotate(120)"/>
    </g>
    <g fill="#f3f1ea">
      <rect x="-7" y="-31" width="14" height="62" rx="7"/>
      <rect x="-7" y="-31" width="14" height="62" rx="7" transform="rotate(60)"/>
      <rect x="-7" y="-31" width="14" height="62" rx="7" transform="rotate(120)"/>
    </g>
  </g>

  <!-- wordmark -->
  <rect x="138" y="40" width="286" height="34" fill="#ffe500"/>
  <text x="146" y="67" font-size="46" font-weight="900" letter-spacing="-1" fill="#0c0c0c">BLOGHUB</text>
  <text x="147" y="98" font-size="15" font-weight="700" letter-spacing="4" fill="#0c0c0c" font-family="'Courier New', monospace">WRITE WITHOUT RULES ✳</text>
