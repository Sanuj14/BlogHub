<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Write a story — BlogHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body data-page="write">
  <div id="site-nav"></div>

  <main class="page">
    <div class="container" style="max-width:820px">
      <div class="page-head reveal">
        <span class="eyebrow"><i class="fa-solid fa-pen-nib"></i> New story</span>
        <h1 id="form-title">Write a story</h1>
        <p class="muted">Share something worth reading. You can save it as a draft first.</p>
      </div>

      <div id="alert"></div>

      <form id="blogForm" class="glass" style="padding:28px">
        <div class="field">
          <label for="title">Title</label>
          <input class="input" id="title" name="title" maxlength="160" placeholder="A catchy, descriptive title" required />
        </div>

        <div class="grid grid-2" style="gap:18px">
          <div class="field">
            <label for="category">Category</label>
            <select class="input" id="category" name="category" required>
              <option value="" disabled selected>Choose a category</option>
              <option>Technology</option><option>Lifestyle</option><option>Travel</option>
              <option>Food</option><option>Health</option><option>Business</option>
              <option>Literature</option><option>Culture</option><option>Other</option>
            </select>
          </div>
          <div class="field">
            <label for="tags">Tags <span class="muted">(comma separated)</span></label>
            <input class="input" id="tags" name="tags" placeholder="e.g. javascript, web, tips" />
          </div>
        </div>

        <div class="field">
          <label for="coverImage">Cover image <span class="muted">(optional)</span></label>
          <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px">
            <label for="coverFile" class="btn btn-ghost btn-sm" style="cursor:pointer">
              <i class="fa-solid fa-image"></i> Choose from gallery
            </label>
            <input type="file" id="coverFile" accept="image/*" style="display:none" />
            <span class="muted" style="font-size:.8rem">or paste a URL below</span>
          </div>
          <input class="input" id="coverImage" name="coverImage" placeholder="https://images.unsplash.com/..." />
          <p class="hint">Pick an image from your device or paste any link. Leave empty for a gradient cover.</p>
          <div id="coverPreview" style="display:none;margin-top:12px;position:relative">
            <img id="coverPreviewImg" style="width:100%;max-height:240px;object-fit:cover;border-radius:12px" />
            <button type="button" id="coverRemove" class="btn btn-danger btn-sm" style="position:absolute;top:10px;right:10px"><i class="fa-solid fa-xmark"></i> Remove</button>
          </div>
        </div>

        <div class="field">
          <label>Content</label>
          <div class="editor-toolbar">
            <select id="fontFamily" title="Font">
              <option value="">Default</option>
              <option value="Georgia, serif">Georgia</option>
              <option value="'Courier New', monospace">Courier</option>
              <option value="Arial, sans-serif">Arial</option>
              <option value="'Times New Roman', serif">Times</option>
            </select>
            <select id="fontSize" title="Size">
              <option value="">Size</option>
              <option value="1">Small</option>
              <option value="3">Normal</option>
              <option value="5">Large</option>
              <option value="7">Huge</option>
            </select>
            <button type="button" data-cmd="bold" title="Bold"><b>B</b></button>
            <button type="button" data-cmd="italic" title="Italic"><i>I</i></button>
            <button type="button" data-cmd="underline" title="Underline"><u>U</u></button>
            <button type="button" data-cmd="strikeThrough" title="Strike"><s>S</s></button>
            <span class="editor-sep"></span>
            <button type="button" data-cmd="justifyLeft" title="Align left"><i class="fa-solid fa-align-left"></i></button>
            <button type="button" data-cmd="justifyCenter" title="Center"><i class="fa-solid fa-align-center"></i></button>
            <button type="button" data-cmd="justifyRight" title="Align right"><i class="fa-solid fa-align-right"></i></button>
            <span class="editor-sep"></span>
            <button type="button" data-cmd="insertUnorderedList" title="Bullet list"><i class="fa-solid fa-list-ul"></i></button>
            <button type="button" data-cmd="insertOrderedList" title="Numbered list"><i class="fa-solid fa-list-ol"></i></button>
            <span class="editor-sep"></span>
            <button type="button" data-cmd="removeFormat" title="Clear formatting"><i class="fa-solid fa-eraser"></i></button>
          </div>
          <div class="editor-body" id="content" contenteditable="true" data-placeholder="Tell your story..."></div>
          <p class="hint"><span id="wordcount">0</span> words</p>
        </div>

        <div style="display:flex;gap:12px;flex-wrap:wrap">
          <button type="submit" class="btn btn-primary" id="publishBtn" data-status="published">
            <i class="fa-solid fa-paper-plane"></i> Publish
          </button>
          <button type="submit" class="btn btn-ghost" id="draftBtn" data-status="draft">
            <i class="fa-solid fa-floppy-disk"></i> Save draft
          </button>
        </div>
      </form>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="/js/config.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/create-blog.js"></script>
</body>
</html>
