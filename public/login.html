<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — BlogHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body data-page="login">
  <div id="site-nav"></div>

  <main class="auth-wrap">
    <div class="auth-card glass reveal in">
      <h1>Welcome back</h1>
      <p class="sub">Log in to continue writing and reading.</p>

      <div id="alert"></div>

      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input class="input" id="email" name="email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input class="input" id="password" name="password" type="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
          <i class="fa-solid fa-arrow-right-to-bracket"></i> Log in
        </button>
      </form>

      <p class="auth-switch"><a href="/reset-password.html">Forgot your password?</a></p>
      <p class="auth-switch">New to BlogHub? <a href="/register.html">Create an account</a></p>
    </div>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/auth-pages.js"></script>
</body>
</html>
